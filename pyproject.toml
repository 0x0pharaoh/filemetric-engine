[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "filecompare"
version = "1.0.0"
description = "Compare text files by similarity percentage"
requires-python = ">=3.9"
dependencies = [
  "scikit-learn>=1.3",
  "numpy>=1.24",
  "scipy>=1.11",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
]

[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]
include = ["filecompare*"]

[tool.pytest.ini_options]
testpaths = ["tests"]`